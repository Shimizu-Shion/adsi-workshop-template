spring:
  application:
    name: attendance

  datasource:
    url: jdbc:postgresql://localhost:5432/attendance
    username: ${DB_USERNAME:attendance}
    password: ${DB_PASSWORD:attendance}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  servlet:
    context-path: /api
